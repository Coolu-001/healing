<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪日记 | 给自己留点空</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full bg-white bg-opacity-90 backdrop-filter backdrop-blur-sm z-50 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-light text-gray-700">给自己留点空</a>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-gray-900 transition-colors">首页</a>
                <a href="diary.html" class="text-gray-900 font-medium hover:text-gray-900 transition-colors">情绪日记</a>
                <a href="treehole.html" class="text-gray-600 hover:text-gray-900 transition-colors">AI树洞</a>
                <a href="checkin.html" class="text-gray-600 hover:text-gray-900 transition-colors">留白打卡</a>
            </div>
            <button id="mobile-menu-button" class="md:hidden text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white">
            <div class="container mx-auto px-4 py-2 flex flex-col space-y-3">
                <a href="index.html" class="text-gray-600 hover:text-gray-900 transition-colors py-2">首页</a>
                <a href="diary.html" class="text-gray-900 font-medium hover:text-gray-900 transition-colors py-2">情绪日记</a>
                <a href="treehole.html" class="text-gray-600 hover:text-gray-900 transition-colors py-2">AI树洞</a>
                <a href="checkin.html" class="text-gray-600 hover:text-gray-900 transition-colors py-2">留白打卡</a>
                <a href="config.html" class="text-gray-600 hover:text-gray-900 transition-colors py-2">AI配置</a>
            </div>
        </div>
    </nav>

    <!-- 云朵装饰 -->
    <div class="fixed top-20 left-10 w-32 h-32 opacity-10 pointer-events-none z-0">
        <img src="images/cloud.svg" alt="云朵" class="w-full h-full object-contain float-animation">
    </div>
    <div class="fixed top-40 right-20 w-40 h-40 opacity-10 pointer-events-none z-0">
        <img src="images/cloud.svg" alt="云朵" class="w-full h-full object-contain float-animation" style="animation-delay: 1s;">
    </div>

    <!-- 主要内容 -->
    <main class="pt-24 pb-16 relative z-10">
        <!-- 页面标题 -->
        <section class="container mx-auto px-4 mb-12">
            <h1 class="text-3xl md:text-4xl font-light text-gray-800 mb-4">情绪日记</h1>
            <p class="text-gray-600 max-w-2xl">
                记录每日情绪，探索内心世界。在这里，你的情绪有处可诉，有迹可循。
            </p>
        </section>

        <!-- 日记编辑区 -->
        <section class="container mx-auto px-4 mb-16">
            <div class="bg-white rounded-lg shadow-sm p-6 md:p-8 max-w-3xl mx-auto">
                <!-- 日期显示 -->
                <div class="mb-6">
                    <h2 id="current-date" class="text-xl text-gray-800 font-light"></h2>
                </div>

                <!-- 情绪选择 -->
                <div class="mb-8">
                    <h3 class="text-gray-700 mb-4">今天的心情如何？</h3>
                    <div class="grid grid-cols-5 gap-4">
                        <button class="emotion-btn" data-emotion="happy">
                            <div class="w-16 h-16 rounded-full bg-pink-100 flex items-center justify-center mx-auto mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-gray-600 text-sm">开心</span>
                        </button>
                        <button class="emotion-btn" data-emotion="sad">
                            <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-gray-600 text-sm">难过</span>
                        </button>
                        <button class="emotion-btn" data-emotion="calm">
                            <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-gray-600 text-sm">平静</span>
                        </button>
                        <button class="emotion-btn" data-emotion="anxious">
                            <div class="w-16 h-16 rounded-full bg-purple-100 flex items-center justify-center mx-auto mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-gray-600 text-sm">焦虑</span>
                        </button>
                        <button class="emotion-btn" data-emotion="neutral">
                            <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-gray-600 text-sm">一般</span>
                        </button>
                    </div>
                </div>

                <!-- 日记内容 -->
                <div class="mb-6">
                    <h3 class="text-gray-700 mb-4">记录今天的感受</h3>
                    <textarea id="diary-content" class="w-full h-48 p-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-300 transition-colors" placeholder="今天发生了什么？你有什么感受？"></textarea>
                </div>

                <!-- 保存按钮和AI陪伴按钮 -->
                <div class="text-center space-y-4">
                    <button id="save-diary" class="bg-gray-800 text-white px-8 py-3 rounded-full hover:bg-gray-700 transition-colors">
                        保存日记
                    </button>
                    <button id="ai-companion-btn" class="bg-gray-100 text-gray-400 px-8 py-3 rounded-full hover:bg-gray-200 transition-colors disabled:cursor-not-allowed" disabled>
                        让小空陪我聊聊
                    </button>
                </div>

                <!-- AI回复区域 -->
                <div id="ai-response-area" class="hidden mt-8 pt-8 border-t border-gray-100">
                    <div class="flex items-start space-x-4">
                        <div class="w-10 h-10 rounded-full bg-blue-50 flex-shrink-0 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <p class="text-gray-800 mb-2">小空</p>
                            <div id="ai-response-content" class="bg-gray-50 p-4 rounded-lg text-gray-700 min-h-[80px]">
                                <!-- AI回复内容将在这里显示 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 历史日记 -->
        <section class="container mx-auto px-4">
            <h2 class="text-2xl font-light text-gray-800 mb-8 text-center">历史日记</h2>
            <div id="diary-list" class="max-w-3xl mx-auto space-y-6">
                <!-- 历史日记将在这里动态加载 -->
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white py-12 border-t border-gray-100 mt-16">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <h3 class="text-2xl font-light text-gray-700 mb-2">给自己留点空</h3>
                    <p class="text-gray-500">找回内心的平静</p>
                </div>
                <div class="flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-800 transition-colors">首页</a>
                    <a href="diary.html" class="text-gray-500 hover:text-gray-800 transition-colors">情绪日记</a>
                    <a href="treehole.html" class="text-gray-500 hover:text-gray-800 transition-colors">AI树洞</a>
                    <a href="checkin.html" class="text-gray-500 hover:text-gray-800 transition-colors">留白打卡</a>
                    <a href="config.html" class="text-gray-500 hover:text-gray-800 transition-colors">AI配置</a>
                </div>
            </div>
            <div class="border-t border-gray-100 mt-8 pt-8 text-center">
                <p class="text-gray-500">&copy; 2025 给自己留点空. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script>
        // 移动端菜单
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });

        // 设置当前日期
        function setCurrentDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 初始化页面
        function initPage() {
            setCurrentDate();
            loadDiaries();
            
            // 检查今天是否已有日记
            const today = new Date().toISOString().split('T')[0];
            const diaries = JSON.parse(localStorage.getItem('diaries') || '{}');
            
            if (diaries[today]) {
                const todayDiary = diaries[today];
                document.getElementById('diary-content').value = todayDiary.content;
                
                // 选中对应的情绪按钮
                document.querySelectorAll('.emotion-btn').forEach(btn => {
                    if (btn.dataset.emotion === todayDiary.emotion) {
                        btn.classList.add('selected');
                        const emotionDiv = btn.querySelector('div');
                        emotionDiv.classList.add('ring-2', 'ring-gray-400');
                    }
                });
            }
        }

        // 情绪选择
        document.querySelectorAll('.emotion-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有选中状态
                document.querySelectorAll('.emotion-btn').forEach(b => {
                    b.classList.remove('selected');
                    const div = b.querySelector('div');
                    div.classList.remove('ring-2', 'ring-gray-400');
                });
                
                // 添加选中状态
                this.classList.add('selected');
                const emotionDiv = this.querySelector('div');
                emotionDiv.classList.add('ring-2', 'ring-gray-400');
            });
        });

        // 检查日记内容是否为空
        function checkDiaryContent() {
            const content = document.getElementById('diary-content').value.trim();
            const selectedEmotion = document.querySelector('.emotion-btn.selected');
            const aiCompanionBtn = document.getElementById('ai-companion-btn');
            
            if (content.length > 10 && selectedEmotion) {
                aiCompanionBtn.disabled = false;
                aiCompanionBtn.classList.remove('bg-gray-100', 'text-gray-400');
                aiCompanionBtn.classList.add('bg-blue-50', 'text-blue-600', 'hover:bg-blue-100');
            } else {
                aiCompanionBtn.disabled = true;
                aiCompanionBtn.classList.add('bg-gray-100', 'text-gray-400');
                aiCompanionBtn.classList.remove('bg-blue-50', 'text-blue-600', 'hover:bg-blue-100');
            }
        }

        // 监听日记内容变化
        document.getElementById('diary-content').addEventListener('input', checkDiaryContent);
        document.querySelectorAll('.emotion-btn').forEach(btn => {
            btn.addEventListener('click', checkDiaryContent);
        });

        // 保存日记
        document.getElementById('save-diary').addEventListener('click', function() {
            const content = document.getElementById('diary-content').value.trim();
            const selectedEmotion = document.querySelector('.emotion-btn.selected');
            
            if (!content) {
                alert('请输入日记内容');
                return;
            }
            
            if (!selectedEmotion) {
                alert('请选择今天的心情');
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const emotion = selectedEmotion.dataset.emotion;
            
            const diaries = JSON.parse(localStorage.getItem('diaries') || '{}');
            diaries[today] = {
                content: content,
                emotion: emotion,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('diaries', JSON.stringify(diaries));
            
            // 显示保存成功提示
            alert('日记保存成功！');
            
            // 重新加载日记列表
            loadDiaries();
            
            // 检查是否可以启用AI陪伴按钮
            checkDiaryContent();
        });

        // 加载历史日记
        function loadDiaries() {
            const diaries = JSON.parse(localStorage.getItem('diaries') || '{}');
            const diaryList = document.getElementById('diary-list');
            
            // 清空列表
            diaryList.innerHTML = '';
            
            // 转换为数组并按日期排序
            const diaryArray = Object.entries(diaries).map(([date, diary]) => ({
                date,
                ...diary
            })).sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // 显示最近的10篇日记
            const recentDiaries = diaryArray.slice(0, 10);
            
            if (recentDiaries.length === 0) {
                diaryList.innerHTML = '<p class="text-gray-500 text-center">还没有历史日记，开始记录你的第一篇吧！</p>';
                return;
            }
            
            recentDiaries.forEach(diary => {
                const date = new Date(diary.date);
                const formattedDate = date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long'
                });
                
                const emotionInfo = getEmotionInfo(diary.emotion);
                
                const diaryItem = document.createElement('div');
                diaryItem.className = 'bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition-shadow';
                diaryItem.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg text-gray-800">${formattedDate}</h3>
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full ${emotionInfo.bgColor} flex items-center justify-center mr-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ${emotionInfo.textColor}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-sm text-gray-600">${emotionInfo.label}</span>
                        </div>
                    </div>
                    <p class="text-gray-700 line-clamp-3">${diary.content}</p>
                `;
                
                diaryList.appendChild(diaryItem);
            });
        }

        // 获取情绪信息
        function getEmotionInfo(emotion) {
            const emotions = {
                happy: { label: '开心', bgColor: 'bg-pink-100', textColor: 'text-pink-500' },
                sad: { label: '难过', bgColor: 'bg-blue-100', textColor: 'text-blue-500' },
                calm: { label: '平静', bgColor: 'bg-green-100', textColor: 'text-green-500' },
                anxious: { label: '焦虑', bgColor: 'bg-purple-100', textColor: 'text-purple-500' },
                neutral: { label: '一般', bgColor: 'bg-gray-100', textColor: 'text-gray-500' }
            };
            
            return emotions[emotion] || emotions.neutral;
        }

        // 小空AI回复系统
        const xiaoKongReplies = {
            // 情绪总结
            emotionSummary: [
                "你今天好像不是生气，而是太久没有休息了。",
                "听起来你今天有些疲惫，需要给自己一点空间。",
                "你描述的感受，似乎更多是一种无奈而不是真正的愤怒。",
                "我感觉你今天的情绪背后，可能藏着一些未被满足的期待。",
                "你提到的这些事情，让我觉得你可能需要一些独处的时间。"
            ],
            
            // 温柔鼓励
            gentleEncouragement: [
                "先别急着要求自己变好。今天能撑下来已经很不容易了。",
                "不用强迫自己振作起来，允许自己有这样的情绪。",
                "你已经在努力了，这就足够了。",
                "慢慢来，不用着急。你的感受都是合理的。",
                "今天的你已经做得很好了，给自己一个拥抱吧。"
            ],
            
            // 轻度疏导
            lightGuidance: [
                "或许你可以试试去散步10分钟，让自己的心情放松一下。",
                "今晚早点关掉手机，给自己一些安静的时间。",
                "要不要听一段白噪音？有时候它能帮助我们平静下来。",
                "现在先休息一下也没关系，不必总是保持高效率。",
                "试着做几次深呼吸，让自己的节奏慢下来。"
            ],
            
            // 通用回复
            general: [
                "谢谢你愿意和我分享这些。",
                "我在这里陪着你，听你说。",
                "你的感受很重要，我在认真听。",
                "慢慢来，不用着急回应我。",
                "能够表达出来，已经是很勇敢的事情了。"
            ]
        };

        // 分析日记内容，生成回复
        function generateXiaoKongReply(content, emotion) {
            const replies = [];
            
            // 根据情绪选择回复类型
            if (emotion === 'sad' || emotion === 'anxious') {
                // 难过或焦虑时，优先使用情绪总结和温柔鼓励
                replies.push(xiaoKongReplies.emotionSummary[Math.floor(Math.random() * xiaoKongReplies.emotionSummary.length)]);
                replies.push(xiaoKongReplies.gentleEncouragement[Math.floor(Math.random() * xiaoKongReplies.gentleEncouragement.length)]);
            } else if (emotion === 'happy' || emotion === 'calm') {
                // 开心或平静时，使用通用回复和轻度疏导
                replies.push(xiaoKongReplies.general[Math.floor(Math.random() * xiaoKongReplies.general.length)]);
                replies.push("很高兴看到你今天的心情不错。");
            } else {
                // 其他情绪，混合使用各种回复
                const replyTypes = [xiaoKongReplies.general, xiaoKongReplies.lightGuidance];
                const selectedType = replyTypes[Math.floor(Math.random() * replyTypes.length)];
                replies.push(selectedType[Math.floor(Math.random() * selectedType.length)]);
            }
            
            // 总是添加一条轻度疏导建议
            replies.push(xiaoKongReplies.lightGuidance[Math.floor(Math.random() * xiaoKongReplies.lightGuidance.length)]);
            
            // 随机添加一条通用回复
            if (Math.random() > 0.5) {
                replies.push(xiaoKongReplies.general[Math.floor(Math.random() * xiaoKongReplies.general.length)]);
            }
            
            // 随机排序回复
            return replies.sort(() => Math.random() - 0.5).join(' ');
        }

        // 显示AI回复
        function showAIResponse() {
            const content = document.getElementById('diary-content').value.trim();
            const selectedEmotion = document.querySelector('.emotion-btn.selected');
            
            if (!content || !selectedEmotion) {
                return;
            }
            
            const emotion = selectedEmotion.dataset.emotion;
            const aiResponseArea = document.getElementById('ai-response-area');
            const aiResponseContent = document.getElementById('ai-response-content');
            
            // 显示加载状态
            aiResponseArea.classList.remove('hidden');
            aiResponseContent.innerHTML = '<div class="flex justify-center items-center h-full"><div class="animate-pulse">小空正在思考...</div></div>';
            
            // 模拟AI思考时间
            setTimeout(() => {
                const reply = generateXiaoKongReply(content, emotion);
                aiResponseContent.innerHTML = `<p>${reply}</p>`;
                
                // 保存AI回复到本地存储
                const today = new Date().toISOString().split('T')[0];
                const diaries = JSON.parse(localStorage.getItem('diaries') || '{}');
                
                if (diaries[today]) {
                    diaries[today].aiReply = reply;
                    localStorage.setItem('diaries', JSON.stringify(diaries));
                }
            }, 1500);
        }

        // 绑定AI陪伴按钮
        document.getElementById('ai-companion-btn').addEventListener('click', showAIResponse);

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
